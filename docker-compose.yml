services:
  scheduler:
    build: .
    command: python scheduler/scheduler.py
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    env_file: .env
    ports:
      - "8501:8501"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
